<!DOCTYPE html>

<html>

<head>

    <title>Our Portfolio</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background: #f7fbf8;

            margin: 0;

            padding: 40px;
        }

        h1 {

            text-align: center;

            color: #0f7a45;

            margin-bottom: 50px;
        }

        .gallery {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));

            gap: 30px;
        }

        .gallery-item {

            background: white;

            padding: 20px;

            border-radius: 15px;

            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .gallery-item img {

            width: 100%;

            border-radius: 10px;
        }

        .gallery-item h3 {

            color: #0f7a45;
        }

        .gallery-item p {

            color: #555;
        }

    </style>

</head>

<body>

    <h1>LinkedIn Campaigns & Content Portfolio</h1>

    <div class="gallery">

        <div class="gallery-item">

            <img src="linkedin-post-1.jpg">

            <h3>Industrial Marketing Campaign</h3>

            <p>Product promotion and brand awareness campaign.</p>

        </div>

        <div class="gallery-item">

            <img src="lead-strategy.jpg">

            <h3>Lead Generation Strategy</h3>

            <p>B2B outreach and customer engagement initiatives.</p>

        </div>

        <div class="gallery-item">

            <img src="newsletter-post-01.jpg">

            <h3>Newsletter & Thought Leadership</h3>

            <p>Content marketing and audience-building activities.</p>

        </div>

    </div>

</body>

</html>
